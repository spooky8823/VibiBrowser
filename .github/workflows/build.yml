name: Build VibiBrowser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  # LINUX → .deb (for Linux Mint / Ubuntu/Debian)
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install Qt + WebEngine
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-webengine-dev \
            qt6-webengine-dev-tools \
            libqt6webenginecore6 \
            libqt6webenginewidgets6 \
            cmake \
            ninja-build \
            dpkg-dev \
            fakeroot

      - name: Build
        run: |
          mkdir build && cd build
          qmake6 ../VibiBrowser.pro CONFIG+=release
          make -j$(nproc)

      - name: Package .deb
        run: |
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN

          cp build/VibiBrowser deb/usr/bin/vibibrowser

          cat > deb/usr/share/applications/vibibrowser.desktop << 'EOF'
          [Desktop Entry]
          Name=VibiBrowser
          Exec=vibibrowser
          Icon=vibibrowser
          Type=Application
          Categories=Network;WebBrowser;
          EOF

          cat > deb/DEBIAN/control << 'EOF'
          Package: vibibrowser
          Version: 1.1.0
          Architecture: amd64
          Maintainer: spooky8823 <spooky8823@vibifiy.dev>
          Description: VibiBrowser - Vibifiy's custom browser
          Depends: libqt6webenginewidgets6, libqt6core6, libqt6gui6, libqt6widgets6
          EOF

          fakeroot dpkg-deb --build deb VibiBrowser-linux.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibiBrowser-linux-deb
          path: VibiBrowser-linux.deb
          retention-days: 30

  # ─────────────────────────────────────────────
  # WINDOWS → .exe installer
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebengine qtpositioning qtwebchannel'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..\VibiBrowser.pro CONFIG+=release
          nmake

      - name: Deploy Qt DLLs
        shell: cmd
        run: |
          mkdir deploy
          copy build\release\VibiBrowser.exe deploy\
          windeployqt --release --webengine deploy\VibiBrowser.exe

      - name: Package into zip
        shell: powershell
        run: |
          Compress-Archive -Path deploy\* -DestinationPath VibiBrowser-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibiBrowser-windows
          path: VibiBrowser-windows.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  # AUTO-RELEASE when pushing a version tag
  # e.g.: git tag v1.1.0 && git push origin v1.1.0
  # ─────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: VibiBrowser-linux-deb

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VibiBrowser-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VibiBrowser-linux.deb
            VibiBrowser-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
