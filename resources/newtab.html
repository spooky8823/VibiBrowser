<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --p:#7B5CF0;--pl:#9D7FFF;--pp:#E8E0FF;--ps:#F5F3FF;--pm:#D4C5FF;--pd:#5A3FA0;
  --bg:#FAFAFE;--sf:#F4F1FF;--s2:#EDE8FF;--tx:#1A1A2E;--tm:#6B6890;
  --br:rgba(123,92,240,0.15);--ta:#E0D8FF;
  --sh:0 2px 20px rgba(123,92,240,0.1);
}
body.dark{
  --bg:#1A1035;--sf:#221545;--s2:#2C1C58;--tx:#EDE9FE;--tm:#9580C4;
  --br:rgba(167,139,250,0.2);--ta:#2A1D50;
  --sh:0 2px 20px rgba(123,92,240,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-y:auto;transition:background .3s,color .3s;}
.nt-bg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;overflow:hidden;z-index:0;}
.nt-bg-v{font-size:380px;font-family:'Outfit',sans-serif;font-weight:900;color:var(--p);opacity:.04;line-height:1;}
.nt-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:860px;padding:44px 32px 80px;}
.nt-greet{font-family:'Outfit',sans-serif;font-size:30px;font-weight:700;color:var(--tx);text-align:center;}
.nt-clock{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;color:var(--tm);text-align:center;margin-top:-10px;}
.se-logo-fallback{font-family:'Outfit',sans-serif;font-size:28px;font-weight:700;color:var(--p);}
.nt-search-wrap{display:flex;align-items:center;gap:10px;width:100%;max-width:580px;}
.nt-search-bar{flex:1;height:46px;background:rgba(255,255,255,0.9);border-radius:24px;border:1px solid var(--br);display:flex;align-items:center;padding:0 8px 0 16px;gap:8px;box-shadow:var(--sh);}
body.dark .nt-search-bar{background:rgba(34,21,69,0.95);}
.nt-search-bar:focus-within{border-color:var(--p);}
.nt-search-bar input{flex:1;border:none;background:transparent;outline:none;font-size:14px;color:var(--tx);font-family:'DM Sans',sans-serif;}
.nt-search-bar input::placeholder{color:#888;}
.nt-srch-btn{width:32px;height:32px;border-radius:50%;background:var(--p);border:none;cursor:pointer;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.nt-srch-btn:hover{background:var(--pd);}
.se-select{background:rgba(255,255,255,0.9);border:1px solid var(--br);border-radius:10px;color:#111;font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 10px;cursor:pointer;outline:none;}
body.dark .se-select{background:rgba(34,21,69,0.95);color:var(--tx);}
.nt-sec-lbl{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--tm);align-self:flex-start;}
.apps-grid{display:flex;flex-wrap:wrap;gap:14px;width:100%;}
.app-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:10px;border-radius:14px;width:84px;transition:background .15s;}
.app-item:hover{background:var(--s2);}
.app-icon{width:56px;height:56px;border-radius:16px;background:var(--sf);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--sh);transition:transform .15s;}
.app-item:hover .app-icon{transform:translateY(-2px) scale(1.04);}
.app-nm{font-size:11px;color:var(--tm);text-align:center;font-weight:500;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.app-add{width:56px;height:56px;border-radius:16px;border:1.5px dashed rgba(123,92,240,.35);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--pl);cursor:pointer;transition:background .15s;}
.app-add:hover{background:var(--s2);}
.vibi-promo{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:18px 22px;width:100%;}
.vibi-promo h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:var(--tx);margin-bottom:4px;}
.vibi-promo p{font-size:12px;color:var(--tm);line-height:1.6;}
.float-btns{position:fixed;right:20px;top:20px;display:flex;flex-direction:column;gap:10px;z-index:50;}
.float-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.15);transition:transform .15s;}
.float-btn:hover{transform:scale(1.1);}
body.dark .float-btn{background:rgba(50,30,90,0.9);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--sf);border:1px solid var(--br);border-radius:18px;padding:24px;width:340px;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-ttl{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:var(--tx);margin-bottom:16px;}
.modal-inp{width:100%;height:38px;border-radius:10px;border:1px solid var(--br);background:var(--bg);color:var(--tx);padding:0 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;}
.modal-inp:focus{border-color:var(--p);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
.btn-cancel{padding:8px 16px;border-radius:10px;border:1px solid var(--br);background:transparent;color:var(--tx);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.btn-ok{padding:8px 16px;border-radius:10px;border:none;background:var(--p);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.btn-ok:hover{background:var(--pd);}
</style>
</head>
<body>
<div class="nt-bg"><div class="nt-bg-v">V</div></div>
<div class="float-btns">
  <button class="float-btn" onclick="toggleDark()" title="Toggle theme" id="themeBtn">🌙</button>
</div>
<div class="nt-inner">
  <div class="nt-greet" id="greeting">Welcome to VibiBrowser</div>
  <div class="nt-clock" id="clock"></div>
  <div class="se-logo-fallback" id="seLogo">Google</div>
  <div class="nt-search-wrap">
    <div class="nt-search-bar">
      <input type="text" id="ntSearch" placeholder="Search the web..." onkeydown="ntKey(event)" autofocus/>
      <button class="nt-srch-btn" onclick="ntGo()">→</button>
    </div>
    <select class="se-select" id="seSelect" onchange="saveSE()">
      <option value="google">Google</option>
      <option value="ddg">DuckDuckGo</option>
      <option value="bing">Bing</option>
      <option value="brave">Brave</option>
      <option value="yahoo">Yahoo</option>
    </select>
  </div>
  <div class="nt-sec-lbl">Apps &amp; Shortcuts</div>
  <div class="apps-grid" id="appsGrid"></div>
  <div class="vibi-promo">
    <h3>🟣 Vibifiy Ecosystem — Free Forever</h3>
    <p>VibiBrowser is part of Vibifiy — privacy-first, no ads, no tracking, no subscriptions. Auto-optimized for your hardware.</p>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-ttl">Add Shortcut</div>
    <input class="modal-inp" id="appName" placeholder="Name (e.g. YouTube)"/>
    <input class="modal-inp" id="appUrl" placeholder="URL (e.g. https://youtube.com)"/>
    <input class="modal-inp" id="appIcon" placeholder="Emoji icon (e.g. 📺)"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" onclick="saveApp()">Add</button>
    </div>
  </div>
</div>

<script>
// Clock
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' · '+n.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
}
updateClock(); setInterval(updateClock,1000);

// Greeting
const hr=new Date().getHours();
document.getElementById('greeting').textContent=(hr<12?'Good morning':hr<17?'Good afternoon':'Good evening')+' — VibiBrowser';

// Dark mode
let dark=localStorage.getItem('dark')==='1';
function applyDark(){document.body.classList.toggle('dark',dark);document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';}
applyDark();
function toggleDark(){dark=!dark;localStorage.setItem('dark',dark?'1':'0');applyDark();}

// Search engine
const seLogos={google:'Google',ddg:'DuckDuckGo',bing:'Bing',brave:'Brave Search',yahoo:'Yahoo'};
let se=localStorage.getItem('se')||'google';
function saveSE(){se=document.getElementById('seSelect').value;localStorage.setItem('se',se);document.getElementById('seLogo').textContent=seLogos[se]||'Search';}
document.getElementById('seSelect').value=se;
document.getElementById('seLogo').textContent=seLogos[se]||'Search';

function ntKey(e){if(e.key==='Enter')ntGo();}
function ntGo(){
  const q=document.getElementById('ntSearch').value.trim();
  if(!q)return;
  const urls={google:'https://www.google.com/search?q=',ddg:'https://duckduckgo.com/?q=',bing:'https://www.bing.com/search?q=',brave:'https://search.brave.com/search?q=',yahoo:'https://search.yahoo.com/search?p='};
  const base=urls[se]||urls.google;
  // Check if it looks like a URL
  if(/^[a-zA-Z0-9\-\.]+\.[a-zA-Z]{2,}/.test(q)&&!q.includes(' ')){
    window.location.href='https://'+q;
  } else {
    window.location.href=base+encodeURIComponent(q);
  }
}

// Apps
let apps=JSON.parse(localStorage.getItem('apps')||'[]');
const defaults=[
  {name:'YouTube',url:'https://youtube.com',icon:'📺'},
  {name:'GitHub',url:'https://github.com',icon:'🐙'},
  {name:'Gmail',url:'https://mail.google.com',icon:'📧'},
  {name:'Maps',url:'https://maps.google.com',icon:'🗺️'},
];
if(!apps.length){apps=[...defaults];localStorage.setItem('apps',JSON.stringify(apps));}

function renderApps(){
  const grid=document.getElementById('appsGrid');
  grid.innerHTML=apps.map((a,i)=>`
    <div class="app-item" onclick="openApp('${a.url}')" ondblclick="removeApp(${i})">
      <div class="app-icon">${a.icon||'🌐'}</div>
      <span class="app-nm">${a.name}</span>
    </div>
  `).join('')+`
    <div class="app-item" onclick="openAddModal()">
      <div class="app-add">+</div>
      <span class="app-nm">Add</span>
    </div>`;
}
renderApps();

function openApp(url){window.location.href=url;}
function removeApp(i){if(confirm('Remove '+apps[i].name+'?')){apps.splice(i,1);localStorage.setItem('apps',JSON.stringify(apps));renderApps();}}
function openAddModal(){document.getElementById('addModal').classList.add('open');}
function closeModal(){document.getElementById('addModal').classList.remove('open');document.getElementById('appName').value='';document.getElementById('appUrl').value='';document.getElementById('appIcon').value='';}
function saveApp(){
  const name=document.getElementById('appName').value.trim();
  const url=document.getElementById('appUrl').value.trim();
  const icon=document.getElementById('appIcon').value.trim()||'🌐';
  if(!name||!url)return;
  apps.push({name,url,icon});
  localStorage.setItem('apps',JSON.stringify(apps));
  renderApps();closeModal();
}
</script>
</body>
</html>
